<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>App Hipódromo (Beta)</title>
  <style>
    body{font-family:Segoe UI,Arial; background:#0b1220; color:#e8eefc; margin:0; display:flex; height:100vh; align-items:center; justify-content:center;}
    .card{max-width:680px; padding:28px; border:1px solid #223; border-radius:16px; background:#0f1a33; box-shadow:0 10px 30px rgba(0,0,0,.35);}
    h1{margin:0 0 8px;}
    .ok{display:inline-block; padding:6px 10px; border-radius:999px; background:#123a1e; color:#7dff9b; border:1px solid #1f6a35; font-weight:600;}
    code{background:#0b1220; padding:2px 6px; border-radius:8px; border:1px solid #223;}
  </style>
</head>
<body>
  <div class="card">
    <div class="ok">Origin activo</div>
    <h1>App Hipódromo (Beta)</h1>
    <p>Tu túnel ya tiene a dónde enrutar.</p>
    <p>Prueba <code>/health</code> para validar estado.</p>
  </div>
</body>
</html>
